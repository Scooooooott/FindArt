[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
# load_dotenv() must run before service imports that read env vars at import time
"backend/app/main.py" = ["E402"]
"scripts/evaluate_pipeline.py" = ["E402"]

[tool.pytest.ini_options]
pythonpath = ["backend"]
testpaths = ["backend/tests"]
addopts = "-q"
markers = [
    "real_api: tests that call live museum/Wiki APIs and are skipped unless FINDART_RUN_REAL_API_TESTS=1",
]
